<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard WhatsApp Oficial — iVoei</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface2: #273449; --border: #334155;
      --text: #f1f5f9; --muted: #94a3b8;
      --green: #4ade80; --red: #ef4444; --yellow: #fbbf24; --blue: #38bdf8;
      --teal: #2dd4bf; --purple: #a78bfa; --orange: #fb923c; --pink: #f472b6;
      --whatsapp: #25D366; --whatsapp-dark: #128C7E;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }

    .header {
      background: linear-gradient(135deg, var(--whatsapp-dark), var(--whatsapp));
      padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 40px; height: 40px; background: rgba(255,255,255,.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .header h1 { font-size: 20px; font-weight: 700; color: #fff; }
    .header h1 span { font-weight: 400; opacity: .85; font-size: 13px; display: block; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .last-update { font-size: 12px; color: rgba(255,255,255,.8); }
    .btn { background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.3); color: #fff; padding: 7px 14px; border-radius: 7px; cursor: pointer; font-size: 12px; transition: background .2s; }
    .btn:hover { background: rgba(255,255,255,.35); }

    /* Filters bar */
    .filters {
      background: var(--surface); padding: 14px 28px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    }
    .filter-group { display: flex; align-items: center; gap: 6px; }
    .filter-group label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; }
    .filter-group select, .filter-group input[type="date"] {
      background: var(--surface2); color: var(--text); border: 1px solid var(--border);
      padding: 7px 10px; border-radius: 7px; font-size: 13px;
    }
    .filter-group select:focus, .filter-group input:focus { outline: none; border-color: var(--whatsapp); }
    .filter-sep { width: 1px; height: 28px; background: var(--border); }
    .btn-filter { background: var(--whatsapp); border: none; color: #fff; padding: 8px 18px; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .btn-filter:hover { background: var(--whatsapp-dark); }
    .btn-clear { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 7px 14px; border-radius: 7px; cursor: pointer; font-size: 12px; }

    .main { padding: 20px 28px; max-width: 1440px; margin: 0 auto; }
    /* KPIs */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-bottom: 22px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; position: relative; overflow: hidden; }
    .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .kpi-card.green::before { background: var(--green); }
    .kpi-card.red::before { background: var(--red); }
    .kpi-card.yellow::before { background: var(--yellow); }
    .kpi-card.blue::before { background: var(--blue); }
    .kpi-card.teal::before { background: var(--teal); }
    .kpi-card.purple::before { background: var(--purple); }
    .kpi-card.whatsapp::before { background: var(--whatsapp); }
    .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); margin-bottom: 6px; }
    .kpi-value { font-size: 28px; font-weight: 700; line-height: 1; }
    .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* Charts */
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 22px; }
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .chart-card.full { grid-column: 1 / -1; }
    .chart-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
    .chart-container { position: relative; height: 280px; }

    /* Funnel */
    .funnel-visual { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 22px; }
    .funnel-stages { display: flex; flex-direction: column; gap: 5px; }
    .funnel-stage { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-radius: 8px; background: var(--surface2); transition: transform .2s; }
    .funnel-stage:hover { transform: translateX(4px); }
    .stage-color { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .stage-name { flex: 1; font-size: 13px; font-weight: 500; }
    .stage-count { font-size: 18px; font-weight: 700; min-width: 36px; text-align: right; }
    .stage-bar-wrapper { flex: 1; max-width: 180px; height: 7px; background: rgba(255,255,255,.06); border-radius: 4px; overflow: hidden; }
    .stage-bar { height: 100%; border-radius: 4px; transition: width .6s ease; }
    .stage-pct { font-size: 12px; color: var(--muted); min-width: 40px; text-align: right; }

    /* Insights */
    .insights-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 22px; }
    .insight-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .insight-item:last-child { border-bottom: none; }
    .insight-icon { font-size: 16px; min-width: 24px; text-align: center; }
    .insight-text { font-size: 13px; line-height: 1.5; }

    /* Table */
    .deals-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 22px; }
    .search-bar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .search-bar input { flex: 1; min-width: 180px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 7px; font-size: 13px; }
    .search-bar input:focus { outline: none; border-color: var(--whatsapp); }
    .search-bar select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 7px; font-size: 13px; }
    .table-wrapper { overflow-x: auto; }
    .deals-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .deals-table th { text-align: left; padding: 8px 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: .4px; border-bottom: 1px solid var(--border); }
    .deals-table td { padding: 8px 10px; border-bottom: 1px solid rgba(51,65,85,.5); }
    .deals-table tr:hover td { background: rgba(255,255,255,.02); }
    .stage-badge { display: inline-block; padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .days-badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; }
    .days-badge.ok { background: rgba(74,222,128,.15); color: var(--green); }
    .days-badge.warn { background: rgba(251,191,36,.15); color: var(--yellow); }
    .days-badge.danger { background: rgba(239,68,68,.15); color: var(--red); }

    /* Partial warning */
    .partial-warn { background: rgba(251,191,36,.12); border: 1px solid rgba(251,191,36,.3); border-radius: 8px; padding: 10px 16px; margin-bottom: 18px; font-size: 13px; color: var(--yellow); display: none; }

    /* Loading */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; gap: 14px; }
    .spinner { width: 44px; height: 44px; border: 4px solid var(--border); border-top-color: var(--whatsapp); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--muted); font-size: 14px; }
    .error-box { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); border-radius: 10px; padding: 18px; text-align: center; color: var(--red); }

    @media (max-width: 900px) {
      .charts-grid { grid-template-columns: 1fr; }
      .header, .filters, .main { padding-left: 16px; padding-right: 16px; }
      .kpi-grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">💬</div>
    <h1>Funil WhatsApp Oficial<span>iVoei — Painel de Controle CRM</span></h1>
  </div>
  <div class="header-right">
    <span class="last-update" id="lastUpdate"></span>
    <button class="btn" onclick="loadDashboard()">↻ Atualizar</button>
  </div>
</div>

<div class="filters">
  <div class="filter-group">
    <label>Funil</label>
    <select id="funnelSelect" style="min-width:220px"></select>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <label>De</label>
    <input type="date" id="dateFrom">
  </div>
  <div class="filter-group">
    <label>Até</label>
    <input type="date" id="dateTo">
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <label>Agente</label>
    <select id="agentFilter" style="min-width:180px">
      <option value="">Todos</option>
    </select>
  </div>
  <div class="filter-sep"></div>
  <button class="btn-filter" onclick="loadDashboard()">Aplicar Filtros</button>
  <button class="btn-clear" onclick="clearFilters()">Limpar</button>
</div>

<div class="main" id="content">
  <div class="loading"><div class="spinner"></div><div class="loading-text">Conectando ao Bitrix24...</div></div>
</div>
<script>
const API = '/api/bitrix';
let categories = [], stages = [], deals = [], users = [];
let stageMap = {}, userMap = {};
let charts = {};
const PALETTE = ['#4ade80','#38bdf8','#fbbf24','#fb923c','#a78bfa','#f472b6','#2dd4bf','#ef4444','#818cf8','#e879f9','#22d3ee','#84cc16','#f97316','#06b6d4','#8b5cf6'];

async function api(params) {
  const r = await fetch(`${API}?${new URLSearchParams(params)}`);
  if (!r.ok) throw new Error(`API ${r.status}`);
  return r.json();
}

async function init() {
  try {
    const [catData, userData] = await Promise.all([
      api({ action: 'categories' }),
      api({ action: 'users' })
    ]);
    categories = catData.result || [];
    users = (userData.result || []).sort((a, b) => a.NAME.localeCompare(b.NAME));

    // Populate funnel select
    const sel = document.getElementById('funnelSelect');
    sel.innerHTML = categories.map(c => `<option value="${c.ID}">${c.NAME} (ID: ${c.ID})</option>`).join('');
    // Default: ID 20
    const idx = categories.findIndex(c => c.ID === '20');
    if (idx >= 0) sel.selectedIndex = idx;

    // Populate agent select
    const agSel = document.getElementById('agentFilter');
    agSel.innerHTML = '<option value="">Todos os agentes</option>' +
      users.map(u => `<option value="${u.ID}">${u.NAME}</option>`).join('');

    // Build user map
    users.forEach(u => { userMap[u.ID] = u.NAME; });

    // Default dates: last 30 days
    const now = new Date();
    const d30 = new Date(now); d30.setDate(d30.getDate() - 30);
    document.getElementById('dateTo').value = now.toISOString().split('T')[0];
    document.getElementById('dateFrom').value = d30.toISOString().split('T')[0];

    await loadDashboard();
  } catch (err) {
    document.getElementById('content').innerHTML = `<div class="error-box"><h3>Erro ao conectar</h3><p>${err.message}</p></div>`;
  }
}

function clearFilters() {
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  document.getElementById('agentFilter').value = '';
  loadDashboard();
}

async function loadDashboard() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">Carregando dados...</div></div>';

  const catId = document.getElementById('funnelSelect').value;
  const dateFrom = document.getElementById('dateFrom').value;
  const dateTo = document.getElementById('dateTo').value;
  const agentId = document.getElementById('agentFilter').value;

  try {
    const params = { action: 'deals', category: catId };
    if (dateFrom) params.dateFrom = dateFrom;
    if (dateTo) params.dateTo = dateTo;

    const [stagesData, dealsData] = await Promise.all([
      api({ action: 'stages', category: catId }),
      api(params)
    ]);

    stages = stagesData.result || [];
    let rawDeals = dealsData.result || [];
    const isPartial = dealsData.partial || false;

    // Client-side agent filter
    if (agentId) rawDeals = rawDeals.filter(d => d.ASSIGNED_BY_ID === agentId);
    deals = rawDeals;

    // Build stage map
    stageMap = {};
    stages.forEach((s, i) => { stageMap[s.STATUS_ID] = { name: s.NAME, sort: s.SORT || i * 10, color: PALETTE[i % PALETTE.length] }; });

    document.getElementById('lastUpdate').textContent = `Atualizado: ${new Date().toLocaleString('pt-BR')}`;
    render(isPartial);
  } catch (err) {
    content.innerHTML = `<div class="error-box"><h3>Erro</h3><p>${err.message}</p></div>`;
  }
}
function render(isPartial) {
  const content = document.getElementById('content');

  // Counts
  const stageCounts = {};
  stages.forEach(s => { stageCounts[s.STATUS_ID] = 0; });
  deals.forEach(d => { stageCounts[d.STAGE_ID] = (stageCounts[d.STAGE_ID] || 0) + 1; });

  const total = deals.length;
  const won = deals.filter(d => d.STAGE_ID?.endsWith(':WON')).length;
  const lost = deals.filter(d => d.STAGE_ID?.endsWith(':LOSE')).length;
  const closed = deals.filter(d => d.CLOSED === 'Y').length;
  const active = total - closed;
  const now = Date.now();
  const stale = deals.filter(d => d.CLOSED !== 'Y' && d.DATE_MODIFY && Math.floor((now - new Date(d.DATE_MODIFY).getTime()) / 864e5) > 30).length;
  const totalOpp = deals.reduce((s, d) => s + (parseFloat(d.OPPORTUNITY) || 0), 0);
  const convRate = total > 0 ? ((won / total) * 100).toFixed(1) : '0.0';
  const lossRate = total > 0 ? ((lost / total) * 100).toFixed(1) : '0.0';

  // Unique agents in deals
  const agentIds = [...new Set(deals.map(d => d.ASSIGNED_BY_ID).filter(Boolean))];

  content.innerHTML = `
    <div class="partial-warn" id="partialWarn" style="${isPartial ? 'display:block' : ''}">
      ⚠️ Dados parciais — o funil tem muitos registros. Aplique um filtro de período para ver todos os dados.
    </div>

    <div class="kpi-grid">
      <div class="kpi-card whatsapp"><div class="kpi-label">Total</div><div class="kpi-value">${total}</div><div class="kpi-sub">${stages.length} estágios</div></div>
      <div class="kpi-card blue"><div class="kpi-label">Ativos</div><div class="kpi-value">${active}</div><div class="kpi-sub">${total > 0 ? ((active/total)*100).toFixed(0) : 0}% do total</div></div>
      <div class="kpi-card green"><div class="kpi-label">Ganhos</div><div class="kpi-value">${won}</div><div class="kpi-sub">Taxa: ${convRate}%</div></div>
      <div class="kpi-card red"><div class="kpi-label">Perdidos</div><div class="kpi-value">${lost}</div><div class="kpi-sub">Taxa: ${lossRate}%</div></div>
      <div class="kpi-card yellow"><div class="kpi-label">Parados +30d</div><div class="kpi-value">${stale}</div><div class="kpi-sub">${active > 0 ? ((stale/active)*100).toFixed(0) : 0}% dos ativos</div></div>
      <div class="kpi-card teal"><div class="kpi-label">Valor Total</div><div class="kpi-value" style="font-size:22px">R$ ${fmt(totalOpp)}</div><div class="kpi-sub">Oportunidades</div></div>
      <div class="kpi-card purple"><div class="kpi-label">Agentes</div><div class="kpi-value">${agentIds.length}</div><div class="kpi-sub">Ativos no filtro</div></div>
    </div>

    <div class="funnel-visual">
      <div class="chart-title">📊 Distribuição por Estágio</div>
      <div class="funnel-stages" id="funnelStages"></div>
    </div>

    <div class="charts-grid">
      <div class="chart-card"><div class="chart-title">🍩 Proporção por Estágio</div><div class="chart-container"><canvas id="cDoughnut"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">📈 Criação ao Longo do Tempo</div><div class="chart-container"><canvas id="cTimeline"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">👤 Top Agentes por Volume</div><div class="chart-container"><canvas id="cAgents"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">🏆 Performance por Agente</div><div class="chart-container"><canvas id="cAgentPerf"></canvas></div></div>
    </div>

    <div class="insights-section">
      <div class="chart-title">💡 Insights</div>
      <div id="insights"></div>
    </div>

    <div class="deals-section">
      <div class="chart-title">📋 Lista de Negócios (${total})</div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Buscar por nome..." oninput="filterTable()">
        <select id="stageFilterTable" onchange="filterTable()"><option value="">Todos os estágios</option></select>
        <select id="agentFilterTable" onchange="filterTable()"><option value="">Todos os agentes</option></select>
      </div>
      <div class="table-wrapper"><table class="deals-table"><thead><tr>
        <th>ID</th><th>Nome</th><th>Estágio</th><th>Agente</th><th>Valor</th><th>Criado</th><th>Última Ativ.</th><th>Dias</th>
      </tr></thead><tbody id="dealsBody"></tbody></table></div>
    </div>
  `;

  renderFunnel(stageCounts, total);
  renderDoughnut(stageCounts);
  renderTimeline();
  renderAgentsChart();
  renderAgentPerfChart();
  renderInsights({ total, active, won, lost, stale, lossRate, convRate });
  populateTableFilters();
  renderTable();
}
// -- Funnel --
function renderFunnel(sc, total) {
  const el = document.getElementById('funnelStages'); if (!el) return;
  const maxC = Math.max(...Object.values(sc), 1);
  const sorted = stages.slice().sort((a, b) => (a.SORT || 0) - (b.SORT || 0));
  el.innerHTML = sorted.map(s => {
    const c = sc[s.STATUS_ID] || 0, pct = total > 0 ? ((c / total) * 100).toFixed(1) : '0.0';
    const col = stageMap[s.STATUS_ID]?.color || '#64748b';
    return `<div class="funnel-stage"><div class="stage-color" style="background:${col}"></div><div class="stage-name">${s.NAME}</div><div class="stage-count">${c}</div><div class="stage-bar-wrapper"><div class="stage-bar" style="width:${maxC > 0 ? (c/maxC)*100 : 0}%;background:${col}"></div></div><div class="stage-pct">${pct}%</div></div>`;
  }).join('');
}

// -- Charts --
function renderDoughnut(sc) {
  const ctx = document.getElementById('cDoughnut'); if (!ctx) return;
  if (charts.d) charts.d.destroy();
  const sorted = stages.slice().sort((a, b) => (a.SORT || 0) - (b.SORT || 0));
  charts.d = new Chart(ctx, { type: 'doughnut', data: {
    labels: sorted.map(s => s.NAME), datasets: [{ data: sorted.map(s => sc[s.STATUS_ID] || 0), backgroundColor: sorted.map(s => stageMap[s.STATUS_ID]?.color || '#64748b'), borderColor: '#1e293b', borderWidth: 2 }]
  }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 10 }, padding: 6, usePointStyle: true } } } } });
}

function renderTimeline() {
  const ctx = document.getElementById('cTimeline'); if (!ctx) return;
  if (charts.t) charts.t.destroy();
  const m = {};
  deals.forEach(d => { if (!d.DATE_CREATE) return; const dt = new Date(d.DATE_CREATE), k = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`; m[k] = (m[k]||0)+1; });
  const keys = Object.keys(m).sort();
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  charts.t = new Chart(ctx, { type: 'bar', data: {
    labels: keys.map(k => { const [y, mo] = k.split('-'); return `${months[+mo-1]}/${y.slice(2)}`; }),
    datasets: [{ label: 'Criados', data: keys.map(k => m[k]), backgroundColor: 'rgba(37,211,102,.6)', borderColor: '#25D366', borderWidth: 1, borderRadius: 3 }]
  }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(51,65,85,.3)' }, ticks: { color: '#94a3b8', font: { size: 10 } } }, y: { grid: { color: 'rgba(51,65,85,.3)' }, ticks: { color: '#94a3b8', font: { size: 10 } }, beginAtZero: true } } } });
}

function renderAgentsChart() {
  const ctx = document.getElementById('cAgents'); if (!ctx) return;
  if (charts.a) charts.a.destroy();
  const ac = {};
  deals.forEach(d => { const id = d.ASSIGNED_BY_ID; if (id) ac[id] = (ac[id]||0)+1; });
  const sorted = Object.entries(ac).sort((a,b) => b[1]-a[1]).slice(0, 12);
  charts.a = new Chart(ctx, { type: 'bar', data: {
    labels: sorted.map(([id]) => userMap[id] || `#${id}`),
    datasets: [{ label: 'Negócios', data: sorted.map(([,c]) => c), backgroundColor: 'rgba(56,189,248,.6)', borderColor: '#38bdf8', borderWidth: 1, borderRadius: 3 }]
  }, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(51,65,85,.3)' }, ticks: { color: '#94a3b8', font: { size: 10 } }, beginAtZero: true }, y: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 } } } } } });
}

function renderAgentPerfChart() {
  const ctx = document.getElementById('cAgentPerf'); if (!ctx) return;
  if (charts.ap) charts.ap.destroy();
  const ac = {};
  deals.forEach(d => {
    const id = d.ASSIGNED_BY_ID; if (!id) return;
    if (!ac[id]) ac[id] = { total: 0, won: 0 };
    ac[id].total++;
    if (d.STAGE_ID?.endsWith(':WON')) ac[id].won++;
  });
  const sorted = Object.entries(ac).filter(([,v]) => v.total >= 3).sort((a,b) => (b[1].won/b[1].total) - (a[1].won/a[1].total)).slice(0, 10);
  charts.ap = new Chart(ctx, { type: 'bar', data: {
    labels: sorted.map(([id]) => userMap[id] || `#${id}`),
    datasets: [
      { label: 'Ganhos', data: sorted.map(([,v]) => v.won), backgroundColor: 'rgba(74,222,128,.7)', borderRadius: 3 },
      { label: 'Perdidos/Abertos', data: sorted.map(([,v]) => v.total - v.won), backgroundColor: 'rgba(239,68,68,.4)', borderRadius: 3 }
    ]
  }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8', font: { size: 10 } } } }, scales: { x: { stacked: true, grid: { color: 'rgba(51,65,85,.3)' }, ticks: { color: '#94a3b8', font: { size: 10 } } }, y: { stacked: true, grid: { color: 'rgba(51,65,85,.3)' }, ticks: { color: '#94a3b8', font: { size: 10 } }, beginAtZero: true } } } });
}
// -- Insights --
function renderInsights({ total, active, won, lost, stale, lossRate, convRate }) {
  const el = document.getElementById('insights'); if (!el) return;
  const items = [];
  if (total === 0) { items.push({ i: 'ℹ️', t: 'Nenhum negócio no período/filtro selecionado.' }); }
  else {
    if (+lossRate > 50) items.push({ i: '🔴', t: `<strong>Taxa de perda crítica (${lossRate}%)</strong> — Revisar qualificação dos leads e processo de follow-up.` });
    else if (+lossRate > 30) items.push({ i: '🟡', t: `<strong>Taxa de perda elevada (${lossRate}%)</strong> — Atenção ao tempo de resposta no WhatsApp.` });
    if (stale > 0) items.push({ i: '🟡', t: `<strong>${stale} negócio(s) sem atividade há +30 dias</strong> — Considere reengajamento.` });
    if (+convRate > 0) items.push({ i: '🟢', t: `<strong>Taxa de conversão: ${convRate}%</strong> — ${won} negócio(s) fechado(s) com sucesso.` });
    if (active > 0) items.push({ i: '🟢', t: `<strong>${active} ativo(s)</strong> em andamento no funil.` });
  }
  if (!items.length) items.push({ i: '✅', t: 'Funil em bom estado!' });
  el.innerHTML = items.map(x => `<div class="insight-item"><div class="insight-icon">${x.i}</div><div class="insight-text">${x.t}</div></div>`).join('');
}

// -- Table --
function populateTableFilters() {
  const sf = document.getElementById('stageFilterTable');
  if (sf) stages.forEach(s => { const o = document.createElement('option'); o.value = s.STATUS_ID; o.textContent = s.NAME; sf.appendChild(o); });
  const af = document.getElementById('agentFilterTable');
  if (af) {
    const ids = [...new Set(deals.map(d => d.ASSIGNED_BY_ID).filter(Boolean))];
    ids.forEach(id => { const o = document.createElement('option'); o.value = id; o.textContent = userMap[id] || `#${id}`; af.appendChild(o); });
  }
}

function filterTable() { renderTable(); }

function renderTable() {
  const tbody = document.getElementById('dealsBody'); if (!tbody) return;
  const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const sf = document.getElementById('stageFilterTable')?.value || '';
  const af = document.getElementById('agentFilterTable')?.value || '';
  let f = deals.filter(d => {
    if (search && !(d.TITLE || '').toLowerCase().includes(search)) return false;
    if (sf && d.STAGE_ID !== sf) return false;
    if (af && d.ASSIGNED_BY_ID !== af) return false;
    return true;
  }).sort((a, b) => new Date(b.DATE_MODIFY || 0) - new Date(a.DATE_MODIFY || 0));
  const lim = f.slice(0, 100);
  tbody.innerHTML = lim.map(d => {
    const st = stageMap[d.STAGE_ID] || { name: d.STAGE_ID, color: '#64748b' };
    const days = d.DATE_MODIFY ? Math.floor((Date.now() - new Date(d.DATE_MODIFY).getTime()) / 864e5) : null;
    const dc = days > 30 ? 'danger' : days > 14 ? 'warn' : 'ok';
    return `<tr>
      <td style="color:var(--muted)">${d.ID}</td>
      <td><strong>${d.TITLE || '—'}</strong></td>
      <td><span class="stage-badge" style="background:${st.color}22;color:${st.color};border:1px solid ${st.color}44">${st.name}</span></td>
      <td style="font-size:11px">${userMap[d.ASSIGNED_BY_ID] || '—'}</td>
      <td>R$ ${fmt(parseFloat(d.OPPORTUNITY)||0)}</td>
      <td style="color:var(--muted)">${fmtDate(d.DATE_CREATE)}</td>
      <td style="color:var(--muted)">${fmtDate(d.DATE_MODIFY)}</td>
      <td>${days !== null ? `<span class="days-badge ${dc}">${days}d</span>` : '—'}</td>
    </tr>`;
  }).join('');
  if (lim.length < f.length) tbody.innerHTML += `<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:14px">Exibindo ${lim.length} de ${f.length}</td></tr>`;
}

// -- Utils --
function fmt(v) { return v.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
function fmtDate(s) { if (!s) return '—'; return new Date(s).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' }); }

// -- Auto refresh 5min --
setInterval(() => loadDashboard(), 5 * 60 * 1000);

init();
</script>
